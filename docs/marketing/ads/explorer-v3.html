<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),tt=document.getElementById('tooltip'),detailContent=document.getElementById('detail-content');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();addEventListener('resize',resize);
const TAU=Math.PI*2,COLORS={src:[94,234,212],docs:[196,181,253],services:[125,211,252],scripts:[253,211,77],config:[249,168,212],test:[252,165,165],workers:[252,165,165],public:[167,243,208]},DCOL=[100,110,130];
function gc(p){const s=p.split('/')[0];return p.includes('/')?s:'root'}
function gco(p){return COLORS[gc(p)]||DCOL}

const D=GRAPH_DATA,hubS=new Set((D.hubs||[]).map(h=>h.path)),orphS=new Set(D.orphans||[]),nMap={},deg={};
for(const e of D.edges){deg[e.source]=(deg[e.source]||0)+1;deg[e.target]=(deg[e.target]||0)+1}

// Build nodes with 3D positions in clusters
const N=D.nodes.map((n,i)=>{
  const cl=gc(n.path),ci=Object.keys(COLORS).indexOf(cl);
  // Spherical cluster positioning
  const phi=(ci>=0?ci:Math.random()*7)/7*TAU+(Math.random()-0.5)*0.6;
  const theta=Math.random()*Math.PI-Math.PI/2;
  const dist=180+Math.random()*220;
  nMap[n.path]=i;
  const d=deg[n.path]||0;
  return{
    ...n,col:gco(n.path),
    x:Math.cos(phi)*Math.cos(theta)*dist,
    y:Math.sin(theta)*dist*0.7,
    z:Math.sin(phi)*Math.cos(theta)*dist,
    vx:0,vy:0,vz:0,
    deg:d,isHub:hubS.has(n.path),isOrphan:orphS.has(n.path),
    r:Math.max(2.5,Math.min(18,2.5+d*0.8)),
    vis:true,hl:false
  }
});
const E=D.edges.map(e=>[nMap[e.source],nMap[e.target],e.kind]).filter(e=>e[0]!==undefined&&e[1]!==undefined);

// 3D force simulation
for(let it=0;it<150;it++){
  const a=1-it/150;
  for(let i=0;i<N.length;i++){
    for(let j=i+1;j<N.length;j++){
      let dx=N[j].x-N[i].x,dy=N[j].y-N[i].y,dz=N[j].z-N[i].z;
      let d2=dx*dx+dy*dy+dz*dz;if(d2>600000)continue;
      let d=Math.sqrt(d2)||1,f=Math.min(3,900*a/(d*d));
      const fx=dx/d*f,fy=dy/d*f,fz=dz/d*f;
      N[i].vx-=fx;N[i].vy-=fy;N[i].vz-=fz;
      N[j].vx+=fx;N[j].vy+=fy;N[j].vz+=fz;
    }
  }
  for(const[a2,b]of E){
    let dx=N[b].x-N[a2].x,dy=N[b].y-N[a2].y,dz=N[b].z-N[a2].z;
    let d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1,f=(d-100)*0.006*a;
    N[a2].vx+=dx/d*f;N[a2].vy+=dy/d*f;N[a2].vz+=dz/d*f;
    N[b].vx-=dx/d*f;N[b].vy-=dy/d*f;N[b].vz-=dz/d*f;
  }
  for(const n of N){
    n.vx-=n.x*0.0006;n.vy-=n.y*0.0006;n.vz-=n.z*0.0006;
    n.x+=n.vx*0.35;n.y+=n.vy*0.35;n.z+=n.vz*0.35;
    n.vx*=0.8;n.vy*=0.8;n.vz*=0.8;
  }

let rotY=0,rotX=-0.25,zoom=1.1,camX=0,camY=0;

let dragging=false,dsx,dsy,drx,dry;
let hovered=null,selected=null,filter='all',sq='';
let time=0;

function project(x,y,z){
  // Y rotation
  let cy=Math.cos(rotY),sy=Math.sin(rotY);
  let x1=x*cy-z*sy,z1=x*sy+z*cy;
  // X rotation
  let cx=Math.cos(rotX),sx=Math.sin(rotX);
  let y1=y*cx-z1*sx,z2=y*sx+z1*cx;

  const fov=1200;

  return{x:x1*scale*zoom+W/2-camX*zoom,y:y1*scale*zoom+H/2-camY*zoom,z:z2,s:scale};
}

function applyFilter(){
  const q=sq.toLowerCase();
  for(const n of N){
    let s=true;
    if(filter==='hubs')s=n.isHub;
    else if(filter==='orphans')s=n.isOrphan;
    else if(filter==='md')s=n.type==='markdown';
    else if(filter==='code')s=n.type==='code';
    if(q&&!n.path.toLowerCase().includes(q))s=false;
    n.vis=s;n.hl=q&&n.path.toLowerCase().includes(q);
  }

  time+=0.016;
  if(autoRot)rotY+=autoSpeed;

  // Background — deep space
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // Nebula glow
  const nb=ctx.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,W*0.5);
  nb.addColorStop(0,'rgba(94,234,212,0.03)');nb.addColorStop(0.5,'rgba(196,181,253,0.015)');nb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  const nb2=ctx.createRadialGradient(W*0.7,H*0.6,0,W*0.7,H*0.6,W*0.4);
  nb2.addColorStop(0,'rgba(125,211,252,0.02)');nb2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb2;ctx.fillRect(0,0,W,H);

  // Stars
  if(!draw.stars){
    draw.stars=[];
    for(let i=0;i<200;i++)draw.stars.push({x:Math.random()*3000-1500,y:Math.random()*3000-1500,z:Math.random()*2000-1000,b:Math.random()});
  }
  for(const s of draw.stars){
    const p=project(s.x,s.y,s.z);
    const a=Math.max(0,Math.min(0.6,s.b*(0.3+Math.sin(time*0.5+s.b*10)*0.15)));
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(p.x,p.y,0.6*p.s*zoom,0,TAU);ctx.fill();
  }

  // Project all nodes
  const proj=N.map((n,i)=>({...n,i,...project(n.x,n.y,n.z)}));
  proj.sort((a,b)=>a.z-b.z);

  // Edges
  for(const[a,b,kind]of E){
    const na=N[a],nb2=N[b];
    if(!na.vis&&!nb2.vis)continue;
    const pa=project(na.x,na.y,na.z),pb=project(nb2.x,nb2.y,nb2.z);
    const depth=Math.max(0.02,Math.min(0.25,(pa.s+pb.s)*0.12));
    let alpha=depth;
    let width=0.4+depth*2;
    if(selected!==null){
      if(a===selected||b===selected){alpha=Math.max(0.4,depth*2);width=1.5+depth*3}
      else{alpha=0.015;width=0.2}
    }
    const isImp=kind==='import';
    ctx.strokeStyle=isImp?`rgba(125,211,252,${alpha})`:`rgba(94,234,212,${alpha*0.8})`;
    ctx.lineWidth=width;
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
  }

  // Data flow particles
  for(let i=0;i<80;i++){
    const ei=i%E.length;
    const[a,b]=E[ei];
    if(!N[a].vis&&!N[b].vis)continue;
    const t=(time*0.15+i*0.037)%1;
    const pa=project(N[a].x,N[a].y,N[a].z),pb=project(N[b].x,N[b].y,N[b].z);
    const px=pa.x+(pb.x-pa.x)*t,py=pa.y+(pb.y-pa.y)*t;
    const ps=(pa.s+pb.s)/2;
    const pa2=Math.sin(t*Math.PI)*ps*0.5;
    if(pa2<0.03)continue;
    ctx.fillStyle=`rgba(94,234,212,${pa2})`;
    ctx.beginPath();ctx.arc(px,py,1.2*ps*zoom,0,TAU);ctx.fill();
  }

  // Nodes
  for(const n of proj){
    if(!n.vis)continue;
    if(n.x<-80||n.x>W+80||n.y<-80||n.y>H+80)continue;
    const[cr,cg,cb]=n.col;
    const r=n.r*n.s*zoom;
    if(r<0.3)continue;
    const depthAlpha=Math.max(0.15,Math.min(1,n.s*1.2));
    let alpha=depthAlpha;
    if(selected!==null&&n.i!==selected)alpha=depthAlpha*0.15;
    if(n.hl)alpha=1;

    // Hub corona
    if(n.isHub&&alpha>0.2){
      const pulse=1+Math.sin(time*1.5+n.r)*0.15;
      // Outer glow
      const g=ctx.createRadialGradient(n.x,n.y,r*0.5,n.x,n.y,r*6*pulse);
      g.addColorStop(0,`rgba(${cr},${cg},${cb},${alpha*0.2})`);
      g.addColorStop(0.4,`rgba(${cr},${cg},${cb},${alpha*0.06})`);
      g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(n.x,n.y,r*6*pulse,0,TAU);ctx.fill();
      // Inner ring
      ctx.strokeStyle=`rgba(${cr},${cg},${cb},${alpha*0.35})`;
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(n.x,n.y,r*2.5*pulse,0,TAU);ctx.stroke();
    }

    // Node sphere with 3D gradient
    const ng=ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.35,r*0.1,n.x,n.y,r);
    ng.addColorStop(0,`rgba(${Math.min(255,cr+80)},${Math.min(255,cg+80)},${Math.min(255,cb+80)},${alpha})`);
    ng.addColorStop(0.6,`rgba(${cr},${cg},${cb},${alpha})`);
    ng.addColorStop(1,`rgba(${Math.max(0,cr-40)},${Math.max(0,cg-40)},${Math.max(0,cb-40)},${alpha*0.7})`);
    ctx.fillStyle=ng;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,TAU);ctx.fill();

    // Specular highlight
    if(r>3){
      ctx.fillStyle=`rgba(255,255,255,${alpha*0.25})`;
      ctx.beginPath();ctx.arc(n.x-r*0.25,n.y-r*0.3,r*0.35,0,TAU);ctx.fill();
    }

    // Selected
    if(n.i===selected){
      ctx.strokeStyle=`rgba(${cr},${cg},${cb},0.7)`;
      ctx.lineWidth=2;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.arc(n.x,n.y,r+8,0,TAU);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Labels
    const showLabel=n.isHub||n.s*zoom>0.9||n.hl||n.i===selected;
    if(showLabel&&r>2){
      const label=n.path.split('/').pop();
      const fs=Math.max(8,Math.min(14,11*n.s*zoom));
      ctx.font=`600 ${fs}px 'JetBrains Mono',monospace`;
      const tw=ctx.measureText(label).width;
      const lx=n.x+r+8,ly=n.y+fs*0.35;

      // Background pill
      const pad=5;
      ctx.fillStyle=`rgba(0,0,0,${alpha*0.8})`;
      ctx.beginPath();
      ctx.roundRect(lx-pad,ly-fs,tw+pad*2+((n.isHub&&n.deg>3)?30:0),fs+pad*2,5);
      ctx.fill();
      ctx.strokeStyle=`rgba(${cr},${cg},${cb},${alpha*0.25})`;
      ctx.lineWidth=0.5;ctx.stroke();

      // Text
      ctx.fillStyle=`rgba(230,237,243,${alpha*0.9})`;
      ctx.textAlign='left';
      ctx.fillText(label,lx,ly);

      // Degree badge
      if(n.isHub&&n.deg>3){
        const bx=lx+tw+pad+4;
        ctx.fillStyle=`rgba(${cr},${cg},${cb},${alpha})`;
        ctx.font=`700 ${Math.max(7,9*n.s*zoom)}px 'JetBrains Mono',monospace`;
        ctx.fillText(String(n.deg),bx,ly);
      }
    }
  }

  requestAnimationFrame(draw);
}

// Mouse — drag to orbit, not pan
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.3,Math.min(3.5,zoom*(e.deltaY>0?0.94:1.06)))},{passive:false});
canvas.addEventListener('mousedown',e=>{dragging=true;dsx=e.clientX;dsy=e.clientY;drx=rotY;dry=rotX;autoRot=false});
addEventListener('mousemove',e=>{
  if(dragging){
    rotY=drx+(e.clientX-dsx)*0.005;
    rotX=dry+(e.clientY-dsy)*0.005;
    rotX=Math.max(-1.2,Math.min(1.2,rotX));
    return;
  }
  // Hover
  const projAll=N.map((n,i)=>{if(!n.vis)return null;const p=project(n.x,n.y,n.z);return{i,x:p.x,y:p.y,r:n.r*p.s*zoom,s:p.s}}).filter(Boolean);
  projAll.sort((a,b)=>b.s-a.s); // front first
  let found=null;
  for(const p of projAll){
    const dx=e.clientX-p.x,dy=e.clientY-p.y;
    if(dx*dx+dy*dy<(p.r+6)*(p.r+6)){found=p.i;break}
  }
  hovered=found;
  if(found!==null){
    const n=N[found];
    tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';
    tt.innerHTML=`<div class="tp">${n.path}</div><div class="tm">${n.type} · ${n.words} words · ${n.deg} connections${n.isHub?' · HUB':''}${n.isOrphan?' · ORPHAN':''}</div>`;
    canvas.style.cursor='pointer';
  }else{tt.style.display='none';canvas.style.cursor='grab'}
});
addEventListener('mouseup',()=>{if(dragging){dragging=false;autoRot=true}});

canvas.addEventListener('click',()=>{
  if(hovered!==null){selected=hovered;showDetail(N[selected])}
  else{selected=null;document.getElementById('detail').classList.remove('open')}
});

canvas.addEventListener('dblclick',()=>{autoRot=true;autoSpeed=autoSpeed>0?-autoSpeed:Math.abs(autoSpeed)});

function showDetail(n){
  document.getElementById('detail').classList.add('open');
  const inc=E.filter(e=>e[1]===nMap[n.path]).map(e=>({path:N[e[0]].path,kind:e[2]}));
  const out=E.filter(e=>e[0]===nMap[n.path]).map(e=>({path:N[e[1]].path,kind:e[2]}));
  let h=`<h2>${n.path}</h2><span class="badge ${n.type}">${n.type}</span>`;
  if(n.isHub)h+=`<span class="badge hub">hub · ${n.deg} connections</span>`;
  if(n.isOrphan)h+=`<span class="badge orphan">orphan</span>`;
  h+=`<div class="metrics"><div class="metric"><strong>${n.words.toLocaleString()}</strong><span>Words</span></div><div class="metric"><strong>${n.deg}</strong><span>Degree</span></div><div class="metric"><strong>${inc.length}</strong><span>Incoming</span></div><div class="metric"><strong>${out.length}</strong><span>Outgoing</span></div></div>`;
  const hd=(n.headings||[]).filter(Boolean);
  if(hd.length){h+=`<h3>Structure (${hd.length})</h3>`;hd.slice(0,12).forEach(t=>{h+=`<div class="heading-item">${t}</div>`})}
  if(inc.length){h+=`<h3>Imported by (${inc.length})</h3>`;inc.forEach(e=>{h+=`<div class="edge-item" onclick="nav('${e.path}')"><span class="fname">${e.path}</span><span class="kind">${e.kind}</span></div>`})}
  if(out.length){h+=`<h3>Imports (${out.length})</h3>`;out.forEach(e=>{h+=`<div class="edge-item" onclick="nav('${e.path}')"><span class="fname">${e.path}</span><span class="kind">${e.kind}</span></div>`})}
  if((n.symbols||[]).length){h+=`<h3>Symbols</h3>`;n.symbols.slice(0,8).forEach(s=>{h+=`<div class="heading-item">${s}</div>`})}
  detailContent.innerHTML=h;
}
window.nav=function(p){const i=nMap[p];if(i!==undefined){selected=i;showDetail(N[i])}};
document.getElementById('close-detail').addEventListener('click',()=>{document.getElementById('detail').classList.remove('open');selected=null});

// Filters
const FB={all:'f-all',hubs:'f-hubs',orphans:'f-orphans',md:'f-md',code:'f-code'};
for(const[f,id]of Object.entries(FB)){
  document.getElementById(id).addEventListener('click',()=>{
    filter=f;applyFilter();
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  });
}
document.getElementById('search-input').addEventListener('input',e=>{sq=e.target.value;applyFilter()});

document.getElementById('nc').textContent=N.length;
document.getElementById('ec').textContent=E.length;
applyFilter();draw();
</script>
</body>
